defaults:
  - dataset: cifar10
  - model: mlp
  - _self_
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled

# Training overrides
epochs: 200
patience: null
seed: 42

# Data
data_dir: ./data
batch_size: 128

# Trainer
accelerator: auto
devices: 1

# Logging
log_dir: ./outputs
prefix: ""

# Hydra output configuration
hydra:
  output_subdir: null
  run:
    dir: ./outputs
  sweep:
    dir: ./outputs
    subdir: ${hydra.job.name}

# Weights & Biases
wandb:
  enabled: true
  project: momos-reproduction
  entity: null
  name: null
  tags: []
  log_model: all

# Quantization
quantization:
  enabled: false
  method: null  # "qat", "momos", or null
  q: 32         # Bit-width for QAT (>=32 means no quantization)
  s: null       # Block size for MoMos
  k: null       # Motif count for MoMos
  capacity: null  # Alternative to k (fraction of blocks)
  force_zero: true  # Include all-zero motif in MoMos
  exclude_layers: []  # Layer name substrings to exclude from QAT
  from_percentile: [0.5] # change 50th percentile
  to_percentile: [0.99] # into 99th percentile
  swapping_probability: null # e.g. 0.5 otherwise nothing is applied

# Metrics
metrics: []  # e.g., [sparsity, l2, gzip, bz2, lzma, bdm]
all_compression_metrics_binarized: false
