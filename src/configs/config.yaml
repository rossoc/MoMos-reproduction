defaults:
  - dataset: cifar10
  - model: mlp
  - _self_
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled

# Training overrides
epochs: 200
patience: null
seed: 42

# Data
data_dir: ./data
batch_size: 128
num_workers: null

# Trainer
accelerator: auto
devices: 1

# Logging
log_dir: ./outputs
prefix: ""

# Hydra output configuration
hydra:
  output_subdir: null
  run:
    dir: ./outputs
  sweep:
    dir: ./outputs
    subdir: ${hydra.job.name}

# Weights & Biases
wandb:
  enabled: true
  project: momos-reproduction
  entity: Carlo
  name: null
  tags: []
  log_model: true
